name: prdemo
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  demo-video:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate demo video
        uses: szabadkai/prdemo@main
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
